<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=440, height=280">
  <title>GK Summary - Promo Tile</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 440px;
      height: 280px;
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    }
    
    .promo-tile {
      width: 440px;
      height: 280px;
      position: relative;
      display: flex;
      align-items: center;
      padding: 24px;
      background: linear-gradient(135deg, #1e3a5f 0%, #0d2137 100%);
      border-radius: 0;
    }
    
    .promo-tile::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(circle at 20% 80%, rgba(56, 189, 248, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(147, 51, 234, 0.1) 0%, transparent 50%);
      pointer-events: none;
    }
    
    .logo-section {
      flex-shrink: 0;
      width: 100px;
      height: 100px;
      background: linear-gradient(145deg, #22d3ee, #3b82f6);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 32px rgba(59, 130, 246, 0.4);
      position: relative;
      z-index: 1;
    }
    
    .logo-icon {
      font-size: 48px;
    }
    
    .content-section {
      flex: 1;
      margin-left: 24px;
      position: relative;
      z-index: 1;
    }
    
    .app-name {
      font-size: 28px;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.2;
      margin-bottom: 8px;
    }
    
    .tagline {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 16px;
      font-weight: 400;
    }
    
    .features {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    
    .feature-badge {
      background: rgba(59, 130, 246, 0.2);
      border: 1px solid rgba(59, 130, 246, 0.3);
      color: #38bdf8;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    
    .feature-badge.accent {
      background: rgba(168, 85, 247, 0.2);
      border-color: rgba(168, 85, 247, 0.3);
      color: #a78bfa;
    }
    
    .cta {
      position: absolute;
      bottom: 24px;
      right: 24px;
      background: linear-gradient(135deg, #22d3ee, #3b82f6);
      color: #0d2137;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 16px rgba(59, 130, 246, 0.4);
      z-index: 1;
    }
    
    .gk-badge {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(234, 179, 8, 0.2);
      border: 1px solid rgba(234, 179, 8, 0.4);
      color: #facc15;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      z-index: 1;
    }
    
    .stars {
      position: absolute;
      top: 16px;
      left: 16px;
      color: #fbbf24;
      font-size: 14px;
      letter-spacing: 2px;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="promo-tile">
    <div class="stars">★★★★★</div>
    <div class="gk-badge">GK SUMMARY</div>
    
    <div class="logo-section">
      <span class="logo-icon">📚</span>
    </div>
    
    <div class="content-section">
      <h1 class="app-name">GK Summary</h1>
      <p class="tagline">Exam Prep Key Points</p>
      <div class="features">
        <span class="feature-badge">📝 Summaries</span>
        <span class="feature-badge">🎯 Key Points</span>
        <span class="feature-badge accent">❓ Quiz Mode</span>
        <span class="feature-badge">💾 Save & Export</span>
      </div>
    </div>
    
    <div class="cta">Add to Chrome →</div>
  </div>
</body>
</html>
